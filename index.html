<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔐 SecureChat | End-to-End Encrypted Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* main chat container: two columns for two users (peer-to-peer style) */
        .chat-panel {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
        }

        /* each user card */
        .user-card {
            flex: 1;
            min-width: 320px;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(66, 153, 225, 0.2);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .user-card:hover {
            transform: translateY(-4px);
        }

        .user-header {
            padding: 1.2rem 1.8rem;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            color: white;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .user-info h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #f1f5f9;
            letter-spacing: -0.2px;
        }

        .user-info p {
            font-size: 0.7rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .badge-enc {
            background: #1e293b;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-family: monospace;
            color: #7dd3fc;
        }

        /* message area */
        .messages-area {
            height: 380px;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #0f172a80;
            scroll-behavior: smooth;
        }

        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 22px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
            transition: all 0.1s;
        }

        /* sent (right) vs received (left) */
        .sent {
            align-self: flex-end;
            background: linear-gradient(115deg, #2563eb, #1e40af);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        .received {
            align-self: flex-start;
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 6px;
            border: 1px solid #334155;
        }

        .encrypted-badge {
            font-size: 0.6rem;
            font-family: monospace;
            background: #00000055;
            border-radius: 16px;
            padding: 2px 8px;
            display: inline-block;
            margin-top: 5px;
            letter-spacing: 0.3px;
        }

        .decrypted-note {
            font-size: 0.65rem;
            color: #a5f3fc;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* input area */
        .input-area {
            padding: 1.2rem 1.2rem 1.5rem;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }

        .message-input-group {
            display: flex;
            gap: 12px;
            background: #0a0f1c;
            border-radius: 60px;
            padding: 5px 5px 5px 18px;
            border: 1px solid #2d3a5e;
            transition: all 0.2s;
        }

        .message-input-group:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px #3b82f640;
        }

        .message-input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            font-size: 0.9rem;
            color: #f1f5f9;
            outline: none;
        }

        .message-input-group input::placeholder {
            color: #475569;
        }

        .send-btn {
            background: #3b82f6;
            border: none;
            border-radius: 40px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .send-btn:hover {
            background: #2563eb;
            transform: scale(0.96);
        }

        .reset-area {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .clear-chat {
            background: none;
            border: 1px solid #334155;
            padding: 5px 14px;
            border-radius: 30px;
            color: #94a3b8;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .clear-chat:hover {
            background: #2d3748;
            color: #facc15;
        }

        .encryption-visual {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 6px;
            color: #5b6e8c;
            font-family: monospace;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        @media (max-width: 780px) {
            body {
                padding: 16px;
            }
            .user-card {
                min-width: 280px;
            }
        }

        .lock-icon {
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="chat-panel" id="chatApp">
    <!-- Alice's Panel (User A) -->
    <div class="user-card" data-user="alice">
        <div class="user-header">
            <div class="avatar">👩‍💻</div>
            <div class="user-info">
                <h2>Alice <span style="font-size:0.8rem;">🔐</span></h2>
                <p><span class="badge-enc">AES-GCM 256</span> <span>✨ end-to-end encrypted</span></p>
            </div>
        </div>
        <div class="messages-area" id="aliceMessages"></div>
        <div class="input-area">
            <div class="message-input-group">
                <input type="text" id="aliceInput" placeholder="Type secure message... 🔒" autocomplete="off">
                <button class="send-btn" id="aliceSendBtn">📨</button>
            </div>
            <div class="encryption-visual">
                <span>🔐 message encrypted before sending → only receiver can decrypt</span>
            </div>
            <div class="reset-area">
                <button class="clear-chat" data-clear="alice">🗑️ Clear chat</button>
            </div>
        </div>
    </div>

    <!-- Bob's Panel (User B) -->
    <div class="user-card" data-user="bob">
        <div class="user-header">
            <div class="avatar">👨‍💻</div>
            <div class="user-info">
                <h2>Bob <span style="font-size:0.8rem;">🛡️</span></h2>
                <p><span class="badge-enc">AES-GCM 256</span> <span>✔️ decrypted on arrival</span></p>
            </div>
        </div>
        <div class="messages-area" id="bobMessages"></div>
        <div class="input-area">
            <div class="message-input-group">
                <input type="text" id="bobInput" placeholder="Type secure message... 🔒" autocomplete="off">
                <button class="send-btn" id="bobSendBtn">📨</button>
            </div>
            <div class="encryption-visual">
                <span>🔓 message decrypted locally & shown in plaintext</span>
            </div>
            <div class="reset-area">
                <button class="clear-chat" data-clear="bob">🗑️ Clear chat</button>
            </div>
        </div>
    </div>
</div>

<script>
    /* -------------------------------------------------------------------------
       SECURE CHAT APP WITH ENCRYPTION (ICS Micro Project)
       Features:
       - End-to-end encryption using Web Crypto API (AES-GCM 256-bit)
       - Shared secret key derived from a static passphrase (demo grade, but real crypto)
       - Each message: before sending → encrypted (ciphertext + iv)
                on receiver side → decrypted back to original text
       - Fully simulated two-user chat (Alice & Bob) using same origin
       - Encrypted payload shown in bubbles (encrypted representation) + decrypted version visible only to receiver
       - Real world style: message stored in encrypted form, decryption happens per message
       ------------------------------------------------------------------------- */
    
    // ---- Global state: messages stored as objects { sender, encryptedData, iv, timestamp, decryptedText? } ----
    // For display, each user sees own sent messages (encrypted representation but they also know plaintext)
    // BUT the project requirement: "Encrypted message shown, then decrypted". So we show both: 
    // In the chat, for each message bubble we display:
    // - Encrypted form (base64 ciphertext snippet) 
    // - And actual decrypted content (for the receiver, and sender also sees what they sent originally)
    
    // To maintain consistency: we store plaintext & encrypted metadata. The chat shows encrypted value + decrypted result.
    // For Alice's messages sent to Bob, Alice will show her own sent message (encrypted representation + decrypted text plain)
    // Bob will see that message with encrypted representation + decrypted plaintext.
    // This meets "Encrypted message shown, then decrypted" perfectly.
    
    // ---- Shared cryptographic key (AES-GCM) derived from a secure passphrase ----
    // In a real app, keys would be exchanged via DH, but for this micro project we use a consistent key
    // derived from a static secret (both sides share the same key). This simulates pre-shared key encryption.
    // For demonstration, the key is generated from "ICS-SecureChat-2025" using PBKDF2.
    
    let globalEncryptionKey = null;   // CryptoKey for AES-GCM
    
    // Helper: Convert ArrayBuffer to Base64 URL-safe (standard base64 for display)
    function abToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }
    
    function base64ToAb(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }
    
    // Derive AES-GCM key from a shared passphrase (static for demo)
    async function getOrCreateKey() {
        if (globalEncryptionKey) return globalEncryptionKey;
        const passphrase = "ICS_Project_SecureChat_2025_EndToEnd";
        const enc = new TextEncoder();
        const salt = enc.encode("SecureChatSalt_V1"); // fixed salt for demo (deterministic)
        const keyMaterial = await window.crypto.subtle.importKey(
            "raw",
            enc.encode(passphrase),
            "PBKDF2",
            false,
            ["deriveKey"]
        );
        const key = await window.crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: salt,
                iterations: 100000,
                hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
        globalEncryptionKey = key;
        return globalEncryptionKey;
    }
    
    // Encrypt a plaintext message => returns { ciphertextBase64, ivBase64 }
    async function encryptMessage(plainText) {
        const key = await getOrCreateKey();
        const encoded = new TextEncoder().encode(plainText);
        const iv = window.crypto.getRandomValues(new Uint8Array(12)); // 96-bit IV for GCM
        const encrypted = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encoded
        );
        return {
            ciphertextBase64: abToBase64(encrypted),
            ivBase64: abToBase64(iv)
        };
    }
    
    // Decrypt a message given ciphertextBase64 and ivBase64 => plaintext string
    async function decryptMessage(ciphertextBase64, ivBase64) {
        try {
            const key = await getOrCreateKey();
            const ciphertext = base64ToAb(ciphertextBase64);
            const iv = new Uint8Array(base64ToAb(ivBase64));
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                key,
                ciphertext
            );
            return new TextDecoder().decode(decrypted);
        } catch (err) {
            console.error("Decryption failed:", err);
            return "[DECRYPTION ERROR: message tampered or wrong key]";
        }
    }
    
    // Data model for messages:
    // {
    //    id: unique timestamp,
    //    sender: 'alice' | 'bob',
    //    encryptedPayload: { ciphertextBase64, ivBase64 },
    //    timestamp: Date,
    //    cachedDecryptedText: string (stored after decryption for display efficiency)
    // }
    let messagesStore = [];   // centralized store
    
    // Helper to refresh both UI (full re-render)
    async function refreshAllMessages() {
        // get containers
        const aliceContainer = document.getElementById('aliceMessages');
        const bobContainer = document.getElementById('bobMessages');
        if (!aliceContainer || !bobContainer) return;
        
        // Clear containers
        aliceContainer.innerHTML = '';
        bobContainer.innerHTML = '';
        
        // sort messages by timestamp ascending
        const sorted = [...messagesStore].sort((a,b) => a.timestamp - b.timestamp);
        
        for (const msg of sorted) {
            // Decrypt the message content (if cachedDecryptedText not present, compute now)
            let plaintext = msg.cachedDecryptedText;
            if (!plaintext) {
                try {
                    plaintext = await decryptMessage(msg.encryptedPayload.ciphertextBase64, msg.encryptedPayload.ivBase64);
                    msg.cachedDecryptedText = plaintext;
                } catch(e) {
                    plaintext = "⚠️ corrupted message";
                    msg.cachedDecryptedText = plaintext;
                }
            }
            
            // Build encrypted representation snippet (show first 30 chars + ...)
            const encryptedSnippet = msg.encryptedPayload.ciphertextBase64.length > 38 
                ? msg.encryptedPayload.ciphertextBase64.substring(0, 32) + "…" 
                : msg.encryptedPayload.ciphertextBase64;
            
            // For each user, determine if the message is sent by current user or received
            // We will render for Alice side and Bob side separately.
            
            // ---- RENDER FOR ALICE PANEL ----
            const aliceBubble = document.createElement('div');
            aliceBubble.className = `message-bubble ${msg.sender === 'alice' ? 'sent' : 'received'}`;
            
            // Sender name prefix
            const senderLabel = msg.sender === 'alice' ? 'You (Alice)' : 'Bob';
            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            // Encrypted representation block + decrypted text
            aliceBubble.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;">
                    <strong style="font-size:0.75rem; opacity:0.8;">${senderLabel} · ${timeStr}</strong>
                    <span class="encrypted-badge" style="font-size:0.6rem;">🔒 ENCRYPTED</span>
                </div>
                <div style="margin-top: 6px; font-family: monospace; font-size:0.75rem; background:#00000030; padding:6px 8px; border-radius:12px; word-break:break-all;">
                    📦 <span style="color:#93c5fd;">${encryptedSnippet}</span>
                </div>
                <div class="decrypted-note">
                    🔓 <span style="font-weight:500;">Decrypted:</span> <span style="color:#bbf0d0;">${escapeHtml(plaintext)}</span>
                </div>
            `;
            aliceContainer.appendChild(aliceBubble);
            
            // ---- RENDER FOR BOB PANEL ----
            const bobBubble = document.createElement('div');
            bobBubble.className = `message-bubble ${msg.sender === 'bob' ? 'sent' : 'received'}`;
            const senderLabelBob = msg.sender === 'bob' ? 'You (Bob)' : 'Alice';
            bobBubble.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
                    <strong style="font-size:0.75rem; opacity:0.8;">${senderLabelBob} · ${timeStr}</strong>
                    <span class="encrypted-badge" style="font-size:0.6rem;">🔒 ENCRYPTED</span>
                </div>
                <div style="margin-top: 6px; font-family: monospace; font-size:0.75rem; background:#00000030; padding:6px 8px; border-radius:12px; word-break:break-all;">
                    📦 <span style="color:#93c5fd;">${encryptedSnippet}</span>
                </div>
                <div class="decrypted-note">
                    🔓 <span style="font-weight:500;">Decrypted:</span> <span style="color:#bbf0d0;">${escapeHtml(plaintext)}</span>
                </div>
            `;
            bobContainer.appendChild(bobBubble);
        }
        
        // Auto-scroll to bottom
        aliceContainer.scrollTop = aliceContainer.scrollHeight;
        bobContainer.scrollTop = bobContainer.scrollHeight;
    }
    
    // Helper to escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // Send a new message from a user
    async function sendMessage(sender, plainText) {
        if (!plainText || plainText.trim() === '') return false;
        const trimmed = plainText.trim();
        // Encrypt before sending
        let encrypted;
        try {
            encrypted = await encryptMessage(trimmed);
        } catch (err) {
            console.error("encryption failed", err);
            return false;
        }
        // Create message record
        const newMsg = {
            id: Date.now() + Math.random() * 10000,
            sender: sender,
            encryptedPayload: {
                ciphertextBase64: encrypted.ciphertextBase64,
                ivBase64: encrypted.ivBase64
            },
            timestamp: Date.now(),
            cachedDecryptedText: trimmed   // store decrypted text directly for performance (also can be re-decrypted)
        };
        messagesStore.push(newMsg);
        await refreshAllMessages();
        return true;
    }
    
    // Clear chat for both users (full reset)
    function clearAllMessages() {
        messagesStore = [];
        refreshAllMessages();
    }
    
    // Clear messages only for specific visual but since chat is shared, we clear globally
    // But each clear button should clear all messages (consistent)
    function resetEntireChat() {
        messagesStore = [];
        refreshAllMessages();
    }
    
    // Event listeners and initialization
    window.addEventListener('DOMContentLoaded', async () => {
        // Ensure key pre-warmed (optional)
        await getOrCreateKey();
        
        // Demo intro message: show encrypted + decrypted example
        const demoMsg = "🔐 Welcome to Secure Chat! Messages are AES-256-GCM encrypted before sending. Each bubble shows encrypted ciphertext + decrypted content.";
        await sendMessage('alice', demoMsg);
        await sendMessage('bob', "Hey Alice! This message is encrypted end-to-end. Even if someone intercepts, they only see ciphertext 🔒");
        
        // Input elements
        const aliceInput = document.getElementById('aliceInput');
        const bobInput = document.getElementById('bobInput');
        const aliceBtn = document.getElementById('aliceSendBtn');
        const bobBtn = document.getElementById('bobSendBtn');
        
        // send handlers
        aliceBtn.addEventListener('click', async () => {
            const msg = aliceInput.value;
            if (msg.trim() === '') return;
            await sendMessage('alice', msg);
            aliceInput.value = '';
            aliceInput.focus();
        });
        
        bobBtn.addEventListener('click', async () => {
            const msg = bobInput.value;
            if (msg.trim() === '') return;
            await sendMessage('bob', msg);
            bobInput.value = '';
            bobInput.focus();
        });
        
        // Enter key support
        aliceInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                aliceBtn.click();
            }
        });
        bobInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                bobBtn.click();
            }
        });
        
        // Clear buttons: both clear the entire conversation
        const clearAliceBtn = document.querySelector('[data-clear="alice"]');
        const clearBobBtn = document.querySelector('[data-clear="bob"]');
        if (clearAliceBtn) {
            clearAliceBtn.addEventListener('click', () => resetEntireChat());
        }
        if (clearBobBtn) {
            clearBobBtn.addEventListener('click', () => resetEntireChat());
        }
        
        // Additional style: set textarea like inputs
    });
    
    // Expose for debugging but not needed
    window.secureChatAPI = { sendMessage, clearAllMessages };
</script>
</body>
</html>
